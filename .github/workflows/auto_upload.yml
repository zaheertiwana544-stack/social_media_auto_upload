name: YouTube to Facebook auto-upload

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-upload
  cancel-in-progress: false

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_HANDLE=${{ secrets.YOUTUBE_CHANNEL_HANDLE }}
          FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN=${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          EOF

      - name: Run one check-and-upload cycle
        run: python run_once.py

      - name: Persist dedup state
        run: |
          git config user.name "auto-upload-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f state.db
          git diff --cached --quiet || git commit -m "Update dedup state [skip ci]"
          git push
